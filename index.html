<body>

  <h1>Markiple – Sleep Mode 🌙</h1>

  <iframe id="player" allow="autoplay"></iframe>

 <button onclick="loadPlaylist()">Next Playlist</button>

  <div class="note">Tip: Lower brightness + full screen for cozy sleep mode</div>

<script>
const playlists = [
  "UU7_YxT-KID8kRbqZo7MyscQ"  // Markiplier uploads playlist
];

function loadPlaylist() {
  const random = playlists[Math.floor(Math.random() * playlists.length)];
  document.getElementById("player").src =
    "https://www.youtube.com/embed/videoseries?list=" + random +
    "&autoplay=1&mute=1&playsinline=1";
}

loadPlaylist();
</script>
